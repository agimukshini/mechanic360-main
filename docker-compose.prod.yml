# Production overrides — use with QNAP mount and public domains
#
#   cp .env.production.example .env   # edit secrets
#   docker compose -f docker-compose.yml -f docker-compose.qnap.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    env_file:
      - .env
    environment:
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,mekaniku360.com,www.mekaniku360.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mekaniku360.com,https://www.mekaniku360.com}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://mekaniku360.com,https://www.mekaniku360.com}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}

  celery:
    env_file:
      - .env

  celery-beat:
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api/v1
    ports:
      - "5173:80"
    # Share the QNAP media mount with nginx so /media/<file> is served
    # directly from disk (no Django round-trip). Read-only — uploads still
    # happen via the backend.
    volumes: !override
      - /mnt/qnap/mechanic:/usr/share/nginx/media:ro
    environment: !reset {}
    depends_on:
      - backend
