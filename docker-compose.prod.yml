# Production overrides — use with QNAP mount and public domains
#
#   cp .env.production.example .env   # edit secrets
#   docker compose -f docker-compose.yml -f docker-compose.qnap.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    env_file:
      - .env
    environment:
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,backmechanic.managefleet.org,mechanic360.managefleet.org}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mechanic360.managefleet.org}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://mechanic360.managefleet.org,https://backmechanic.managefleet.org}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api/v1
    ports:
      - "5173:80"
    volumes: !reset []
    environment: !reset {}
    depends_on:
      - backend
