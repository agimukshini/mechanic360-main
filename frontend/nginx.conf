server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vehicle photos, inspection images, and document uploads can be several MB.
    # Keep this in sync with Django's DATA_UPLOAD_MAX_MEMORY_SIZE and any
    # outer reverse proxy (Nginx Proxy Manager — see REVERSE_PROXY.md).
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api/ {
        # Re-resolve Docker service name on each request (avoids 502 after backend restarts).
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # JWT Set-Cookie headers on login can exceed default proxy buffers.
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # User uploads (vehicle photos, inspection images, documents) live on the
    # QNAP NAS, mounted into THIS container at /usr/share/nginx/media (read-only)
    # by docker-compose.prod.yml. Serving them directly with nginx is ~10×
    # faster than proxying through Django and avoids Django needing to handle
    # static media in production (DEBUG=0 disables django.conf.urls.static).
    # QNAP bind mount: /usr/share/nginx/media/vehicle_photos/...
    location /media/ {
        root /usr/share/nginx;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
