server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vehicle photos, inspection images, and document uploads can be several MB.
    # Keep this in sync with Django's DATA_UPLOAD_MAX_MEMORY_SIZE and any
    # outer reverse proxy (Nginx Proxy Manager — see REVERSE_PROXY.md).
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # User uploads (vehicle photos, inspection images, documents) live on the
    # QNAP NAS, mounted into THIS container at /usr/share/nginx/media (read-only)
    # by docker-compose.prod.yml. Serving them directly with nginx is ~10×
    # faster than proxying through Django and avoids Django needing to handle
    # static media in production (DEBUG=0 disables django.conf.urls.static).
    location /media/ {
        alias /usr/share/nginx/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
